<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JC Labs</title>

<style>
body{
    margin:0;
    background:linear-gradient(135deg,#111,#1d1d1d,#222);
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.container{
    text-align:center;
}

h1{
    font-size:5rem;
    margin:0;
    text-transform:uppercase;
    letter-spacing:6px;
}

p{
    margin-top:20px;
    font-size:1.5rem;
    color:#bdbdbd;
    letter-spacing:3px;
}

.dot{
    animation:blink 1.5s infinite;
}

@keyframes blink{
    50%{opacity:0.2;}
}
</style>
</head>

<body>

<div class="container">
    <h1>JC Labs</h1>
    <p>Coming Soon<span class="dot">...</span></p>
</div>

</body>
</html>
